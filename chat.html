<!DOCTYPE html>
<html lang="fr"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Assistant documentaire</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/static/theme.css">
</head><body>

<aside id="cote">
  <h3>📂 Documents</h3>
  <div id="filtreActif"></div>
  <div id="arbo"></div>
  <button id="rafraichir" onclick="window.chargerArbre()">↻ Rafraîchir</button>

  <div class="bloc">
    <div class="combo">
      <input id="catUpload" autocomplete="off" placeholder="Catégorie (dossier) — vide = « general »">
      <button type="button" id="catFleche" class="combo-fleche">▼</button>
      <div id="catListe" class="combo-liste"></div>
    </div>
    <a class="lien-ajout" onclick="document.getElementById('fichier').click()">➕ Ajouter un document</a>
    <input id="fichier" type="file" accept="*/*" onchange="televerser()">
  </div>
</aside>

<main id="principal">
  <h2>Assistant documentaire</h2>
  <div id="fil"></div>
  <p class="barre">
    <input id="q" placeholder="Posez votre question…" onkeydown="if(event.key==='Enter')envoyer()">
    <button onclick="envoyer()">Envoyer</button>
  </p>
</main>

<div id="apercuModal" onclick="if(event.target===this)fermerApercu()">
  <div class="apercuBoite">
    <div class="apercuEntete">
      <span id="apercuTitre"></span>
      <button class="apercuFermer" onclick="fermerApercu()">✕ Fermer</button>
    </div>
    <div id="apercuCorps"></div>
  </div>
</div>

<script src="/static/arborescence.js"></script>
<script src="/static/apercu.js"></script>
<script src="/static/categories.js"></script>
<script>
function ajouter(qui, texte){
  const d = document.createElement("div");
  d.className = qui;
  d.textContent = texte;
  const fil = document.getElementById("fil");
  fil.appendChild(d);
  fil.scrollTop = fil.scrollHeight;
}

function echapper(s){
  return s.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
}

function formater(texte, refs){
  let t = echapper(texte);
  t = t.replace(/\*\*(.+?)\*\*/g, '<strong class="cle">$1</strong>');
  t = t.replace(/\*(.+?)\*/g, '<strong class="cle">$1</strong>');
  t = t.replace(/\[(\d+)\]/g, (m, n) => refs[n]
    ? '<sup class="cite" data-n="' + n + '">' + n + '</sup>'
    : m);
  return t;
}

function masquerCitation(){
  const p = document.getElementById("citePopover");
  if(p) p.style.display = "none";
}

function montrerCitation(chip, ref){
  if(!ref) return;
  let pop = document.getElementById("citePopover");
  if(!pop){
    pop = document.createElement("div");
    pop.id = "citePopover";
    pop.onclick = (e) => e.stopPropagation();
    document.body.appendChild(pop);
  }
  pop.innerHTML = "";
  const titre = document.createElement("div");
  titre.className = "citeTitre";
  titre.textContent = ref.source;
  const extrait = document.createElement("div");
  extrait.className = "citeExtrait";
  extrait.textContent = ref.extrait;
  const lien = document.createElement("a");
  lien.className = "citeLien";
  lien.textContent = "Afficher la source";
  lien.onclick = () => { masquerCitation(); if(window.apercu) window.apercu(ref.chemin, ref.source); };
  pop.appendChild(titre);
  pop.appendChild(extrait);
  pop.appendChild(lien);
  const r = chip.getBoundingClientRect();
  pop.style.display = "block";
  pop.style.top = (window.scrollY + r.bottom + 6) + "px";
  pop.style.left = Math.min(window.scrollX + r.left, window.innerWidth - 360) + "px";
}

function surlignerNombres(racine){
  const motif = /\d[\d .,]*\s*(?:%|€|\$|jours?|mois|ans?|semaines?|heures?|minutes?|pour cent|euros?|EUR|USD)?/gi;
  const marcheur = document.createTreeWalker(racine, NodeFilter.SHOW_TEXT, null);
  const noeuds = [];
  while(marcheur.nextNode()){
    const n = marcheur.currentNode;
    if(n.parentElement && n.parentElement.closest(".cite,strong")) continue;
    if(/\d/.test(n.nodeValue)) noeuds.push(n);
  }
  for(const n of noeuds){
    const frag = document.createDocumentFragment();
    let dernier = 0;
    const valeur = n.nodeValue;
    valeur.replace(motif, (m, offset) => {
      if(!/\d/.test(m)) return m;
      if(offset > dernier) frag.appendChild(document.createTextNode(valeur.slice(dernier, offset)));
      const fort = document.createElement("strong");
      fort.className = "cle";
      fort.textContent = m.trim();
      frag.appendChild(fort);
      dernier = offset + m.length;
      return m;
    });
    if(dernier < valeur.length) frag.appendChild(document.createTextNode(valeur.slice(dernier)));
    n.parentNode.replaceChild(frag, n);
  }
}

function ajouterReponse(reponse, references){
  const refs = {};
  (references || []).forEach(r => { refs[r.numero] = r; });
  const d = document.createElement("div");
  d.className = "bot";
  const corps = document.createElement("div");
  corps.innerHTML = formater(reponse.trim(), refs);
  d.appendChild(corps);

  if(!corps.querySelector("strong.cle")) surlignerNombres(corps);

  const chips = corps.querySelectorAll(".cite");
  chips.forEach(chip => {
    chip.onclick = (e) => { e.stopPropagation(); montrerCitation(chip, refs[chip.dataset.n]); };
  });

  if(chips.length === 0 && references && references.length > 0){
    const noms = [...new Set(references.map(r => r.source))];
    const s = document.createElement("div");
    s.className = "source";
    s.textContent = "Sources : " + noms.join(", ");
    d.appendChild(s);
  }

  const fil = document.getElementById("fil");
  fil.appendChild(d);
  fil.scrollTop = fil.scrollHeight;
}

document.addEventListener("click", masquerCitation);

async function envoyer(){
  const champ = document.getElementById("q");
  const question = champ.value.trim();
  if(!question) return;
  ajouter("moi", question);
  champ.value = "";
  const r = await fetch("/demander", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({
      texte: question,
      categorie: window.categorieFiltre,
      insister: true
    })
  });
  const data = await r.json();
  ajouterReponse(data.reponse, data.references);
}

async function televerser(){
  const entree = document.getElementById("fichier");
  if(!entree.files.length){ ajouter("info", "Choisissez un fichier."); return; }
  const categorie = document.getElementById("catUpload").value.trim() || "general";
  const corps = new FormData();
  corps.append("fichier", entree.files[0]);
  ajouter("info", "Envoi et indexation en cours…");
  const r = await fetch("/televerser?categorie=" + encodeURIComponent(categorie), {
    method: "POST",
    body: corps
  });
  const data = await r.json();
  ajouter("info", data.message || "Document traité.");
  entree.value = "";
  window.chargerArbre();
}
</script>
</body></html>
