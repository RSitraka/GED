<!DOCTYPE html>
<html lang="fr"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Assistant documentaire</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/static/theme.css">
</head><body>

<aside id="cote">
  <h3>📂 Documents</h3>
  <div id="filtreActif"></div>
  <div id="arbo"></div>
  <button id="rafraichir" onclick="window.chargerArbre()">↻ Rafraîchir</button>

  <div class="bloc">
    <input id="catUpload" list="listeCategories" placeholder="Catégorie (dossier) — laisser vide pour « general »">
    <datalist id="listeCategories"></datalist>
    <a class="lien-ajout" onclick="document.getElementById('fichier').click()">➕ Ajouter un document</a>
    <input id="fichier" type="file" accept="*/*" onchange="televerser()">
  </div>
</aside>

<main id="principal">
  <h2>Assistant documentaire</h2>
  <div id="fil"></div>
  <p class="barre">
    <input id="q" placeholder="Posez votre question…" onkeydown="if(event.key==='Enter')envoyer()">
    <button onclick="envoyer()">Envoyer</button>
  </p>
</main>

<div id="apercuModal" onclick="if(event.target===this)fermerApercu()">
  <div class="apercuBoite">
    <div class="apercuEntete">
      <span id="apercuTitre"></span>
      <button class="apercuFermer" onclick="fermerApercu()">✕ Fermer</button>
    </div>
    <div id="apercuCorps"></div>
  </div>
</div>

<script src="/static/arborescence.js"></script>
<script src="/static/apercu.js"></script>
<script>
function ajouter(qui, texte){
  const d = document.createElement("div");
  d.className = qui;
  d.textContent = texte;
  const fil = document.getElementById("fil");
  fil.appendChild(d);
  fil.scrollTop = fil.scrollHeight;
}

function echapper(s){
  return s.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
}

function formater(texte){
  let t = echapper(texte);
  t = t.replace(/\*\*(.+?)\*\*/g, '<strong class="cle">$1</strong>');
  t = t.replace(/\*(.+?)\*/g, '<strong class="cle">$1</strong>');
  return t;
}

function ajouterReponse(reponse, sources){
  const d = document.createElement("div");
  d.className = "bot";
  const corps = document.createElement("div");
  corps.innerHTML = formater(reponse.trim());
  d.appendChild(corps);
  if(sources && sources.length > 0){
    const s = document.createElement("div");
    s.className = "source";
    s.textContent = "Sources : " + sources.join(", ");
    d.appendChild(s);
  }
  const fil = document.getElementById("fil");
  fil.appendChild(d);
  fil.scrollTop = fil.scrollHeight;
}

async function envoyer(){
  const champ = document.getElementById("q");
  const question = champ.value.trim();
  if(!question) return;
  ajouter("moi", question);
  champ.value = "";
  const r = await fetch("/demander", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({
      texte: question,
      categorie: window.categorieFiltre,
      insister: true
    })
  });
  const data = await r.json();
  ajouterReponse(data.reponse, data.sources);
}

async function televerser(){
  const entree = document.getElementById("fichier");
  if(!entree.files.length){ ajouter("info", "Choisissez un fichier."); return; }
  const categorie = document.getElementById("catUpload").value.trim() || "general";
  const corps = new FormData();
  corps.append("fichier", entree.files[0]);
  ajouter("info", "Envoi et indexation en cours…");
  const r = await fetch("/televerser?categorie=" + encodeURIComponent(categorie), {
    method: "POST",
    body: corps
  });
  const data = await r.json();
  ajouter("info", data.message || "Document traité.");
  entree.value = "";
  window.chargerArbre();
}
</script>
</body></html>
